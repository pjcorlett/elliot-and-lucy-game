<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 480" width="200" height="480">
  <!-- Mom - idle, mostly background presence. Stand-in placeholder. -->

  <!-- Legs (gray jeans) -->
  <rect x="78" y="320" width="20" height="120" fill="#a8b2bc" stroke="#2c2c2c" stroke-width="2"/>
  <rect x="102" y="320" width="20" height="120" fill="#a8b2bc" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="88" cy="445" rx="14" ry="6" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="112" cy="445" rx="14" ry="6" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Yellow jacket -->
  <path d="M55,180 Q55,140 100,140 Q145,140 145,180 L150,320 L50,320 Z"
        fill="#f4c542" stroke="#2c2c2c" stroke-width="3"/>
  <!-- Belt with brown buckle -->
  <rect x="50" y="240" width="100" height="14" fill="#594a3c" stroke="#2c2c2c" stroke-width="2"/>
  <rect x="92" y="240" width="16" height="14" fill="#f4c542" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Arms (yellow sleeves) -->
  <rect x="40" y="180" width="14" height="120" rx="6" fill="#f4c542" stroke="#2c2c2c" stroke-width="2"/>
  <rect x="146" y="180" width="14" height="120" rx="6" fill="#f4c542" stroke="#2c2c2c" stroke-width="2"/>
  <circle cx="47" cy="305" r="9" fill="#f4d6b5" stroke="#2c2c2c" stroke-width="2"/>
  <circle cx="153" cy="305" r="9" fill="#f4d6b5" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Brown shoulder bag -->
  <rect x="138" y="270" width="34" height="42" rx="4" fill="#594a3c" stroke="#2c2c2c" stroke-width="2"/>
  <path d="M148,270 Q148,200 100,180" stroke="#594a3c" stroke-width="3" fill="none"/>

  <!-- Neck -->
  <rect x="92" y="130" width="16" height="20" fill="#f4d6b5" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Head -->
  <ellipse cx="100" cy="95" rx="40" ry="46" fill="#f4d6b5" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Brown short hair -->
  <path d="M58,75 Q58,40 100,40 Q142,40 142,75 Q140,80 130,76 Q120,68 100,72 Q80,68 70,76 Q60,80 58,75 Z"
        fill="#7a5a2a" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Eyes -->
  <ellipse cx="86" cy="95" rx="6" ry="8" fill="white" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="114" cy="95" rx="6" ry="8" fill="white" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="86" cy="97" rx="3" ry="5" fill="#2c2c2c"/>
  <ellipse cx="114" cy="97" rx="3" ry="5" fill="#2c2c2c"/>

  <!-- Eyebrows -->
  <path d="M80,82 Q86,79 92,82" stroke="#7a5a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M108,82 Q114,79 120,82" stroke="#7a5a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <ellipse cx="78" cy="115" rx="5" ry="3" fill="#f4a6a6" opacity="0.5"/>
  <ellipse cx="122" cy="115" rx="5" ry="3" fill="#f4a6a6" opacity="0.5"/>

  <!-- Smile -->
  <path d="M90,123 Q100,128 110,123" stroke="#a04545" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
