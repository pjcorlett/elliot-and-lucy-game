<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 380" width="200" height="380">
  <!-- Lucy - idle pose, mouth closed -->
  <!-- Stand-in placeholder. Replace with cutout from artist. -->

  <!-- Legs (black leggings) -->
  <rect x="78" y="240" width="20" height="100" fill="#2c2c2c" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="102" y="240" width="20" height="100" fill="#2c2c2c" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Pink shoes -->
  <ellipse cx="88" cy="345" rx="14" ry="6" fill="#f4a6a6" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="112" cy="345" rx="14" ry="6" fill="#f4a6a6" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Body / striped sweater -->
  <path d="M60,160 Q60,130 100,130 Q140,130 140,160 L140,250 Q100,260 60,250 Z"
        fill="#f4c542" stroke="#2c2c2c" stroke-width="3"/>
  <!-- Orange stripes -->
  <rect x="60" y="170" width="80" height="14" fill="#e89b4f"/>
  <rect x="60" y="200" width="80" height="14" fill="#e89b4f"/>
  <rect x="60" y="230" width="80" height="14" fill="#e89b4f"/>

  <!-- Arms hanging at sides -->
  <rect x="48" y="160" width="14" height="80" rx="6" fill="#f4c542" stroke="#2c2c2c" stroke-width="2"/>
  <rect x="138" y="160" width="14" height="80" rx="6" fill="#f4c542" stroke="#2c2c2c" stroke-width="2"/>
  <!-- Hands -->
  <circle cx="55" cy="248" r="9" fill="#f4d6b5" stroke="#2c2c2c" stroke-width="2"/>
  <circle cx="145" cy="248" r="9" fill="#f4d6b5" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Hair back layer -->
  <path d="M48,90 Q40,170 60,210 L80,200 L80,90 Z"
        fill="#f4d96e" stroke="#2c2c2c" stroke-width="3"/>
  <path d="M152,90 Q160,170 140,210 L120,200 L120,90 Z"
        fill="#f4d96e" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Head -->
  <ellipse cx="100" cy="100" rx="48" ry="56" fill="#f4d6b5" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Hair top -->
  <path d="M52,75 Q60,42 100,38 Q140,42 148,75 Q140,72 132,82 Q120,68 100,70 Q80,68 68,82 Q60,72 52,75 Z"
        fill="#f4d96e" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Eyebrows -->
  <path d="M76,86 Q82,82 88,86" stroke="#7a5a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M112,86 Q118,82 124,86" stroke="#7a5a2a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes (whites) -->
  <ellipse cx="82" cy="100" rx="7" ry="9" fill="white" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="118" cy="100" rx="7" ry="9" fill="white" stroke="#2c2c2c" stroke-width="2"/>
  <!-- Pupils -->
  <ellipse cx="82" cy="102" rx="4" ry="6" fill="#2c2c2c"/>
  <ellipse cx="118" cy="102" rx="4" ry="6" fill="#2c2c2c"/>
  <!-- Eye highlights -->
  <circle cx="84" cy="99" r="1.5" fill="white"/>
  <circle cx="120" cy="99" r="1.5" fill="white"/>

  <!-- Cheeks -->
  <ellipse cx="74" cy="118" rx="5" ry="3" fill="#f4a6a6" opacity="0.6"/>
  <ellipse cx="126" cy="118" rx="5" ry="3" fill="#f4a6a6" opacity="0.6"/>

  <!-- Mouth (closed: gentle smile) -->
  <path d="M90,128 Q100,134 110,128" stroke="#2c2c2c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
