<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 460" width="200" height="460">
  <!-- Cashier - idle, behind register. Stand-in placeholder. -->

  <!-- Body / green apron -->
  <path d="M50,180 Q50,140 100,140 Q150,140 150,180 L150,400 L50,400 Z"
        fill="#5DAA68" stroke="#2c2c2c" stroke-width="3"/>
  <!-- Apron pocket -->
  <rect x="80" y="270" width="40" height="35" fill="#3d7a48" stroke="#2c2c2c" stroke-width="2"/>
  <!-- Name tag -->
  <rect x="115" y="195" width="22" height="14" fill="white" stroke="#2c2c2c" stroke-width="1.5"/>

  <!-- Arms -->
  <rect x="38" y="180" width="14" height="100" rx="6" fill="#5DAA68" stroke="#2c2c2c" stroke-width="2"/>
  <rect x="148" y="180" width="14" height="100" rx="6" fill="#5DAA68" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Neck -->
  <rect x="92" y="125" width="16" height="22" fill="#d4a878" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Head -->
  <ellipse cx="100" cy="92" rx="40" ry="46" fill="#d4a878" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Headscarf / hijab -->
  <path d="M58,80 Q58,40 100,38 Q142,40 142,80 Q142,110 130,135 L70,135 Q58,110 58,80 Z"
        fill="white" stroke="#2c2c2c" stroke-width="3"/>
  <!-- Headscarf shoulder drape -->
  <path d="M70,135 L60,165 L75,165 L82,140 Z" fill="white" stroke="#2c2c2c" stroke-width="2"/>
  <path d="M130,135 L140,165 L125,165 L118,140 Z" fill="white" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Eyes -->
  <ellipse cx="86" cy="92" rx="6" ry="8" fill="white" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="114" cy="92" rx="6" ry="8" fill="white" stroke="#2c2c2c" stroke-width="2"/>
  <ellipse cx="86" cy="94" rx="3" ry="5" fill="#2c2c2c"/>
  <ellipse cx="114" cy="94" rx="3" ry="5" fill="#2c2c2c"/>

  <!-- Eyebrows -->
  <path d="M80,80 Q86,77 92,80" stroke="#2c2c2c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M108,80 Q114,77 120,80" stroke="#2c2c2c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M88,116 Q100,124 112,116" stroke="#a04545" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lipstick -->
  <ellipse cx="100" cy="118" rx="11" ry="3" fill="#cc5e5e" opacity="0.4"/>
</svg>
