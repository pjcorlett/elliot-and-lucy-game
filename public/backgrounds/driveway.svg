<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="1920" height="1080">
  <!-- Sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8eef6"/>
      <stop offset="100%" stop-color="#b8e0ee"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ec968"/>
      <stop offset="100%" stop-color="#7eb050"/>
    </linearGradient>
    <linearGradient id="driveway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b6b0"/>
      <stop offset="100%" stop-color="#8e8c84"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="540" fill="url(#sky)"/>

  <!-- House behind on left -->
  <rect x="60" y="280" width="500" height="280" fill="#f4d96e" stroke="#2c2c2c" stroke-width="4"/>
  <!-- House roof -->
  <polygon points="40,280 580,280 480,180 140,180" fill="#a04545" stroke="#2c2c2c" stroke-width="4"/>
  <!-- House window -->
  <rect x="120" y="340" width="100" height="100" fill="#aedef0" stroke="#2c2c2c" stroke-width="4"/>
  <line x1="170" y1="340" x2="170" y2="440" stroke="#2c2c2c" stroke-width="3"/>
  <line x1="120" y1="390" x2="220" y2="390" stroke="#2c2c2c" stroke-width="3"/>
  <!-- House door -->
  <rect x="320" y="380" width="80" height="180" fill="#7a5a2a" stroke="#2c2c2c" stroke-width="4"/>
  <circle cx="385" cy="475" r="4" fill="#f4c542"/>

  <!-- House on right (smaller, partial) -->
  <rect x="1500" y="320" width="420" height="240" fill="#e8b48c" stroke="#2c2c2c" stroke-width="4"/>
  <polygon points="1480,320 1940,320 1860,240 1560,240" fill="#7a5a2a" stroke="#2c2c2c" stroke-width="4"/>
  <rect x="1560" y="380" width="120" height="100" fill="#aedef0" stroke="#2c2c2c" stroke-width="4"/>
  <line x1="1620" y1="380" x2="1620" y2="480" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Pine trees on right -->
  <polygon points="1300,540 1240,360 1180,540" fill="#5d8a4f" stroke="#2c2c2c" stroke-width="3"/>
  <polygon points="1280,500 1240,340 1200,500" fill="#6d9a5f" stroke="#2c2c2c" stroke-width="3"/>
  <rect x="1235" y="540" width="10" height="40" fill="#5a3a1a"/>
  <polygon points="1430,540 1370,330 1310,540" fill="#5d8a4f" stroke="#2c2c2c" stroke-width="3"/>
  <rect x="1365" y="540" width="10" height="40" fill="#5a3a1a"/>

  <!-- Garden border (rocks) -->
  <ellipse cx="1080" cy="555" rx="60" ry="20" fill="#a89a82" stroke="#2c2c2c" stroke-width="3"/>
  <circle cx="1100" cy="540" r="22" fill="#9a8a72" stroke="#2c2c2c" stroke-width="3"/>
  <circle cx="1140" cy="552" r="18" fill="#a89a82" stroke="#2c2c2c" stroke-width="3"/>

  <!-- Flowers -->
  <circle cx="1100" cy="510" r="8" fill="#f4a6a6"/>
  <circle cx="1085" cy="495" r="7" fill="#e89b4f"/>
  <circle cx="1118" cy="495" r="7" fill="#cc5e9b"/>

  <!-- Grass strip -->
  <rect x="0" y="540" width="700" height="100" fill="url(#grass)"/>
  <rect x="900" y="540" width="1020" height="100" fill="url(#grass)"/>

  <!-- Driveway (concrete slabs) -->
  <rect x="600" y="540" width="400" height="540" fill="url(#driveway)" stroke="#2c2c2c" stroke-width="3"/>
  <line x1="800" y1="540" x2="800" y2="1080" stroke="#2c2c2c" stroke-width="3" opacity="0.6"/>
  <line x1="600" y1="780" x2="1000" y2="780" stroke="#2c2c2c" stroke-width="3" opacity="0.6"/>

  <!-- Chalk drawings on driveway -->
  <!-- Sun (left) -->
  <circle cx="700" cy="900" r="40" fill="none" stroke="#f4c542" stroke-width="6"/>
  <line x1="700" y1="840" x2="700" y2="820" stroke="#f4c542" stroke-width="6"/>
  <line x1="700" y1="960" x2="700" y2="980" stroke="#f4c542" stroke-width="6"/>
  <line x1="640" y1="900" x2="620" y2="900" stroke="#f4c542" stroke-width="6"/>
  <line x1="760" y1="900" x2="780" y2="900" stroke="#f4c542" stroke-width="6"/>
  <line x1="660" y1="860" x2="650" y2="850" stroke="#f4c542" stroke-width="6"/>
  <line x1="740" y1="940" x2="750" y2="950" stroke="#f4c542" stroke-width="6"/>

  <!-- Stars -->
  <text x="650" y="1040" font-size="48" fill="#f4c542" font-family="Comic Sans MS">★</text>
  <text x="730" y="1010" font-size="40" fill="#e89b4f" font-family="Comic Sans MS">★</text>

  <!-- Squiggles on right slab -->
  <path d="M870,920 Q890,890 910,920 Q930,950 950,920" stroke="#5da4ff" stroke-width="6" fill="none"/>
  <path d="M850,990 L880,1000 L910,990 L940,1010" stroke="#cc5e9b" stroke-width="6" fill="none"/>

  <!-- Cloud -->
  <ellipse cx="400" cy="120" rx="100" ry="36" fill="white" opacity="0.85"/>
  <ellipse cx="450" cy="100" rx="70" ry="30" fill="white" opacity="0.85"/>
  <ellipse cx="1500" cy="160" rx="120" ry="40" fill="white" opacity="0.85"/>
  <ellipse cx="1560" cy="138" rx="80" ry="30" fill="white" opacity="0.85"/>
</svg>
