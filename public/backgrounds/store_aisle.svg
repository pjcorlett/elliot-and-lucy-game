<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="1920" height="1080">
  <!-- Store aisle: shelves of cans/boxes, perspective floor -->
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c8b0"/>
      <stop offset="100%" stop-color="#9c8e76"/>
    </linearGradient>
    <linearGradient id="ceiling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f1e8"/>
      <stop offset="100%" stop-color="#e8e2cc"/>
    </linearGradient>
  </defs>

  <!-- Ceiling -->
  <rect width="1920" height="200" fill="url(#ceiling)"/>

  <!-- Back wall (lighter) -->
  <rect y="200" width="1920" height="540" fill="#f4ebd6"/>

  <!-- Shelves on back wall - horizontal rows of cans/boxes -->
  <!-- Top shelf: red cans -->
  <rect x="0" y="240" width="1920" height="14" fill="#7a5a2a" stroke="#2c2c2c" stroke-width="2"/>
  <g>
    <rect x="40" y="180" width="80" height="60" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="130" y="180" width="80" height="60" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="220" y="180" width="80" height="60" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="310" y="180" width="80" height="60" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="400" y="180" width="80" height="60" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="490" y="180" width="80" height="60" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="580" y="180" width="80" height="60" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="670" y="180" width="80" height="60" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="760" y="180" width="80" height="60" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="850" y="180" width="80" height="60" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="940" y="180" width="80" height="60" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
  </g>

  <!-- Middle shelf: cereal boxes -->
  <rect x="0" y="380" width="1920" height="14" fill="#7a5a2a" stroke="#2c2c2c" stroke-width="2"/>
  <g>
    <rect x="40" y="280" width="100" height="100" fill="#5da4ff" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="150" y="280" width="100" height="100" fill="#7BB661" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="260" y="280" width="100" height="100" fill="#cc5e9b" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="370" y="280" width="100" height="100" fill="#f4c542" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="480" y="280" width="100" height="100" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="590" y="280" width="100" height="100" fill="#5da4ff" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="700" y="280" width="100" height="100" fill="#9B6FB0" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="810" y="280" width="100" height="100" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="920" y="280" width="100" height="100" fill="#7BB661" stroke="#2c2c2c" stroke-width="2"/>
    <!-- Box label hints -->
    <rect x="60" y="310" width="60" height="40" fill="white" opacity="0.6"/>
    <rect x="170" y="310" width="60" height="40" fill="white" opacity="0.6"/>
    <rect x="280" y="310" width="60" height="40" fill="white" opacity="0.6"/>
  </g>

  <!-- Bottom shelf: more boxes -->
  <rect x="0" y="520" width="1920" height="14" fill="#7a5a2a" stroke="#2c2c2c" stroke-width="2"/>
  <g>
    <rect x="40" y="430" width="100" height="90" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="150" y="430" width="100" height="90" fill="#5DAA68" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="260" y="430" width="100" height="90" fill="#cc5e9b" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="370" y="430" width="100" height="90" fill="#e89b4f" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="480" y="430" width="100" height="90" fill="#5da4ff" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="590" y="430" width="100" height="90" fill="#f4c542" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="700" y="430" width="100" height="90" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="810" y="430" width="100" height="90" fill="#9B6FB0" stroke="#2c2c2c" stroke-width="2"/>
    <rect x="920" y="430" width="100" height="90" fill="#7BB661" stroke="#2c2c2c" stroke-width="2"/>
  </g>

  <!-- Lane signs (red circle pills with numbers) -->
  <circle cx="1300" cy="300" r="50" fill="#cc5e5e" stroke="#2c2c2c" stroke-width="4"/>
  <text x="1300" y="320" font-size="56" fill="white" text-anchor="middle" font-family="Comic Sans MS" font-weight="bold">1</text>
  <circle cx="1450" cy="280" r="50" fill="#7BB661" stroke="#2c2c2c" stroke-width="4"/>
  <text x="1450" y="300" font-size="56" fill="white" text-anchor="middle" font-family="Comic Sans MS" font-weight="bold">2</text>
  <circle cx="1600" cy="300" r="50" fill="#5da4ff" stroke="#2c2c2c" stroke-width="4"/>
  <text x="1600" y="320" font-size="56" fill="white" text-anchor="middle" font-family="Comic Sans MS" font-weight="bold">3</text>

  <!-- Refrigerated coolers on right side (glass doors) -->
  <rect x="1240" y="380" width="160" height="360" fill="#aedef0" stroke="#2c2c2c" stroke-width="4" opacity="0.6"/>
  <rect x="1410" y="380" width="160" height="360" fill="#aedef0" stroke="#2c2c2c" stroke-width="4" opacity="0.6"/>
  <rect x="1580" y="380" width="160" height="360" fill="#aedef0" stroke="#2c2c2c" stroke-width="4" opacity="0.6"/>
  <line x1="1320" y1="380" x2="1320" y2="740" stroke="#2c2c2c" stroke-width="2"/>
  <line x1="1490" y1="380" x2="1490" y2="740" stroke="#2c2c2c" stroke-width="2"/>
  <line x1="1660" y1="380" x2="1660" y2="740" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Floor -->
  <rect y="740" width="1920" height="340" fill="url(#floor)"/>
  <!-- Floor tile lines -->
  <line x1="0" y1="820" x2="1920" y2="820" stroke="#7a6e58" stroke-width="2" opacity="0.4"/>
  <line x1="0" y1="900" x2="1920" y2="900" stroke="#7a6e58" stroke-width="2" opacity="0.4"/>
  <line x1="0" y1="980" x2="1920" y2="980" stroke="#7a6e58" stroke-width="2" opacity="0.4"/>
  <line x1="640" y1="740" x2="640" y2="1080" stroke="#7a6e58" stroke-width="2" opacity="0.4"/>
  <line x1="1280" y1="740" x2="1280" y2="1080" stroke="#7a6e58" stroke-width="2" opacity="0.4"/>

  <!-- Five dollar bill on the floor (Lucy will spot) -->
  <g transform="translate(900,920) rotate(-8)">
    <rect width="80" height="36" fill="#7BB661" stroke="#2c2c2c" stroke-width="2" rx="2"/>
    <circle cx="40" cy="18" r="9" fill="#a4c957" stroke="#2c2c2c" stroke-width="1.5"/>
    <text x="40" y="22" font-size="12" text-anchor="middle" fill="#2c2c2c" font-weight="bold">5</text>
  </g>
</svg>
